name: Vercel Preview Deployment

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

on:
  pull_request: # プルリクエスト作成・更新時にトリガー

jobs:
  Deploy-Preview:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # PRにコメントを追加する権限
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v3

      - name: Node.jsのセットアップ
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: npm # npmのキャッシュを有効化

      - name: Vercel CLIのインストール
        run: npm install --global vercel@latest

      - name: Vercelの環境情報の取得
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: プロジェクトのビルド
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Vercelへのプレビューデプロイ
        id: deploy
        run: |
          DEPLOY_JSON=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} --json)
          DEPLOY_URL=$(echo "$DEPLOY_JSON" | jq -r '.url')
          ALIAS_URL=$(echo "$DEPLOY_JSON" | jq -r '.alias[0]')
          echo "url=https://$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "alias=https://$ALIAS_URL" >> $GITHUB_OUTPUT

      - name: PRにプレビューURLをコメント
        uses: actions/github-script@v6
        with:
          script: |
            const deployUrl = "${{ steps.deploy.outputs.url }}";
            const aliasUrl = "${{ steps.deploy.outputs.alias }}";
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Vercel プレビューデプロイが完了しました！\n\n` +
                    `* 🔗 **個別デプロイ（毎回変わる）**: ${deployUrl}\n` +
                    `* 🔄 **ブランチの最新（固定URL）**: ${aliasUrl}`
            })
