name: Vercel Preview Deployment

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

on:
  pull_request: # プルリクエスト作成・更新時にトリガー

jobs:
  Deploy-Preview:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # PRにコメントを追加する権限
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Node.jsのセットアップ
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: npm # npmのキャッシュを有効化

      - name: Vercel CLIのインストール
        run: npm install --global vercel@latest

      - name: Vercelの環境情報の取得
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: プロジェクトのビルド
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Vercelへのプレビューデプロイ
        id: deploy
        run: |
          # 1. Vercelへのビルド済み成果物のアップロードとデプロイを実行（JSON形式で結果を取得）
          #    Vercel履歴で正しく表示されるよう、GitHub ActionsのGitメタデータ(--meta)も一緒に送信します。
          DEPLOY_JSON=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} \
            --meta githubCommitOrg=${{ github.repository_owner }} \
            --meta githubCommitRepo=${{ github.event.repository.name }} \
            --meta githubCommitRef=${{ github.head_ref || github.ref_name }} \
            --meta githubCommitSha=${{ github.event.pull_request.head.sha || github.sha }} \
            --meta githubCommitAuthorName="${{ github.actor }}" \
            --json)
          
          # 2. JSON出力からデプロイID（APIでの検索用）と個別デプロイURLを抽出
          DEPLOY_ID=$(echo "$DEPLOY_JSON" | jq -r 'select(.id != null) | .id' | tail -n 1)
          DEPLOY_URL=$(echo "$DEPLOY_JSON" | jq -r 'select(.url != null) | .url' | tail -n 1)
          
          # 3. Vercel側でブランチ固定URL（エイリアス）が割り当てられるのを5秒間待つ（非同期処理のため）
          sleep 5
          
          # 4. Vercel APIを使って、このデプロイに設定されたエイリアスURLを取得
          ALIAS_JSON=$(curl -s -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" "https://api.vercel.com/v2/deployments/${DEPLOY_ID}/aliases")
          ALIAS_URL=$(echo "$ALIAS_JSON" | jq -r '.aliases[0].alias')
          
          # 5. 個別デプロイURLの https:// の重複を防止（すでに含まれている場合はそのまま、ない場合は付加）
          if [[ "$DEPLOY_URL" != http* ]]; then DEPLOY_URL="https://$DEPLOY_URL"; fi
          
          # 6. エイリアスURLの処理（APIから取得できたらhttpsを付加。失敗した場合はブランチ名から自動推測して生成）
          if [[ "$ALIAS_URL" != http* && "$ALIAS_URL" != "null" && -n "$ALIAS_URL" ]]; then 
            ALIAS_URL="https://$ALIAS_URL"
          else
            # ブランチ名の中の特殊文字（スラッシュなど）をURLで使用できる形式（ハイフン）に変換
            CLEAN_BRANCH=$(echo "${{ github.head_ref || github.ref_name }}" | tr '[:upper:]' '[:lower:]' | sed -e 's/[^a-z0-9]/-/g' -e 's/-\{2,\}/-/g' -e 's/^-//' -e 's/-$//')
            ALIAS_URL="https://${{ github.event.repository.name }}-git-${CLEAN_BRANCH}-${{ github.repository_owner }}.vercel.app"
          fi
          
          # 7. 後続のコメント投稿ステップで使えるよう、結果を出力変数に設定
          
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "alias=$ALIAS_URL" >> $GITHUB_OUTPUT

      - name: PRにプレビューURLをコメント
        uses: actions/github-script@v6
        with:
          script: |
            const deployUrl = "${{ steps.deploy.outputs.url }}";
            const aliasUrl = "${{ steps.deploy.outputs.alias }}";
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Vercel プレビューデプロイが完了しました！\n\n` +
                    `* 🔗 **個別デプロイ（毎回変わる）**: ${deployUrl}\n` +
                    `* 🔄 **ブランチの最新（固定URL）**: ${aliasUrl}`
            })
