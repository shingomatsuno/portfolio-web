name: Vercel Preview Deployment

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

on:
  pull_request: # プルリクエスト作成・更新時にトリガー

jobs:
  Deploy-Preview:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # PRにコメントを追加する権限
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v3
        with:
          # PR元の最新コミットを直接チェックアウトしてコミットメッセージを正しくします
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Node.jsのセットアップ
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: npm # npmのキャッシュを有効化

      - name: Vercel CLIのインストール
        run: npm install -g vercel@latest

      - name: Vercel環境設定の取得 (Pull)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Vercelでのビルド
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Vercelへのデプロイ
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} \
            --meta githubCommitRef=${{ github.event.pull_request.head.ref }} \
            --meta githubCommitSha=${{ github.event.pull_request.head.sha }} \
            --meta githubDeployment=1)
          echo "preview-url=$DEPLOY_URL" >> $GITHUB_OUTPUT

      - name: PRにURLをコメント投稿
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const rawUrl = '${{ steps.deploy.outputs.preview-url }}';
            const projectRep = 'portfolio-web';
            
            // ブランチ名の中の英数字以外の文字（/, _, など）をハイフンに置き換え、すべて小文字にする
            const branchName = '${{ github.event.pull_request.head.ref }}';
            const normalizedBranch = branchName
              .replace(/[^a-zA-Z0-9]/g, '-')
              .toLowerCase()
              .replace(/-+/g, '-'); // 連続するハイフンを1つにまとめる
              
            const scope = 'shingomatsunos-projects';
            const branchUrl = `https://${projectRep}-git-${normalizedBranch}-${scope}.vercel.app`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '### 🚀 Vercel プレビューデプロイ準備完了！',
                '',
                '| 項目 | URL |',
                '| :--- | :--- |',
                `| **プレビューURL (毎回変更)** | [${rawUrl}](${rawUrl}) |`,
                `| **ブランチ固定URL (不変)** | [${branchUrl}](${branchUrl}) |`,
                '',
                '* コミット: ${{ github.event.pull_request.head.sha }}'
              ].join('\n')
            });
